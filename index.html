<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Suika Game</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}body{overflow:hidden;font-family:Inter,Arial,sans-serif;background:#d69b57;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#7a441e}.game-shell{width:1180px;max-width:100%;border-radius:32px;overflow:hidden;border:1px solid rgba(255,255,255,.2);background:radial-gradient(circle at center,#f7d89d 0%,#d59b57 58%,#c8843d 100%);box-shadow:0 30px 60px rgba(0,0,0,.3)}.topbar{height:58px;background:#ff7a00;color:white;display:flex;justify-content:center;align-items:center;font-weight:900;font-size:24px;gap:8px}.layout{display:grid;grid-template-columns:280px 1fr 280px;gap:24px;padding:28px}.panel{display:flex;flex-direction:column;gap:20px}.score-bubble{width:190px;height:190px;margin:0 auto;border-radius:50%;background:rgba(255,255,255,.25);border:6px solid rgba(255,255,255,.6);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;box-shadow:inset 0 0 35px rgba(255,255,255,.5),0 14px 25px rgba(91,52,18,.22)}.score-bubble h2{font-size:42px;text-shadow:0 3px 2px rgba(0,0,0,.25)}.score-bubble .score{font-size:52px;font-weight:900}.score-bubble .best{margin-top:10px;font-size:14px;opacity:.85;text-transform:uppercase;font-weight:800}.leaderboard,.next-panel,.evolution-panel{background:#fff1c8;border:5px solid rgba(255,255,255,.7);border-radius:28px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.15)}.leaderboard h3,.next-panel h3,.evolution-panel h3{text-align:center;color:white;font-size:34px;font-weight:900;text-shadow:0 3px 2px rgba(91,52,18,.6);margin-bottom:18px}.leader-item{height:48px;border-radius:999px;display:flex;align-items:center;gap:14px;padding:0 14px;margin-bottom:10px;color:white;font-weight:900;font-size:22px}.leader-item span{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.4);display:flex;justify-content:center;align-items:center;color:#7a441e}.gold{background:#facc15}.blue{background:#60a5fa}.orange{background:#fb923c}.gray{background:#a3a3a3}.center{display:flex;flex-direction:column;align-items:center}.drop-strip{z-index:5;margin-bottom:-12px;border-radius:999px;background:rgba(255,255,255,.7);border:5px solid #ffe29a;padding:14px 34px;display:flex;gap:20px;font-size:46px;box-shadow:0 12px 30px rgba(0,0,0,.12)}#gameContainer{position:relative;width:430px;height:640px;overflow:hidden;border-radius:24px;background:rgba(255,233,184,.72);border:10px solid #ffe08a;box-shadow:inset 0 0 0 12px rgba(255,236,166,.75),inset 0 -38px 0 rgba(191,155,77,.22),0 18px 40px rgba(95,55,18,.25);touch-action:none}.fruit{position:absolute;display:flex;justify-content:center;align-items:center;transform:translate(-50%,-50%);pointer-events:none;filter:drop-shadow(0 8px 10px rgba(0,0,0,.25))}#currentFruit{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:58px;z-index:10;pointer-events:none}.next-preview{height:140px;border-radius:24px;background:rgba(255,255,255,.45);display:flex;justify-content:center;align-items:center;font-size:80px}.evolution-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;background:rgba(255,255,255,.45);border-radius:24px;padding:16px;font-size:42px;text-align:center}.overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;background:rgba(255,241,200,.15);backdrop-filter:blur(1px);z-index:20}.play-btn{width:280px;height:82px;border:none;border-radius:32px;background:linear-gradient(to bottom,#84ff53,#2faa24);color:white;font-size:42px;font-weight:900;cursor:pointer;box-shadow:0 10px 0 #2f8d28,0 20px 35px rgba(59,130,35,.35);transition:.15s}.play-btn:active{transform:translateY(6px);box-shadow:0 4px 0 #2f8d28}.best-score{margin-top:34px;background:rgba(255,255,255,.6);border-radius:999px;padding:16px 34px;text-align:center;font-weight:900;box-shadow:inset 0 0 12px rgba(255,255,255,.5)}.game-over{position:absolute;inset:0;background:rgba(91,52,18,.55);backdrop-filter:blur(4px);display:none;justify-content:center;align-items:center;z-index:50}.game-over-card{background:#fff1c8;border:6px solid #ffd66b;border-radius:32px;padding:32px;text-align:center}.game-over-card h2{font-size:42px;margin-bottom:12px}.restart-btn{margin-top:18px;border:none;border-radius:18px;background:#22c55e;color:white;padding:14px 28px;font-weight:900;font-size:20px;cursor:pointer}@media(max-width:1100px){.layout{grid-template-columns:1fr}.panel{flex-direction:row;overflow-x:auto}#gameContainer{width:100%;max-width:430px}}
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="topbar">🍉 emojiSuikaGame</div>
    <div class="layout">
      <div class="panel"><div class="score-bubble"><h2>Score</h2><div class="score" id="score">0</div><div class="best">BEST SCORE</div><div style="font-size:30px;font-weight:900" id="bestScore">0</div></div><div class="leaderboard"><h3>Leaderboard</h3><div class="leader-item gold"><span>1</span>27433</div><div class="leader-item blue"><span>2</span>26696</div><div class="leader-item orange"><span>3</span>23182</div><div class="leader-item gray"><span>4</span>19945</div><div class="leader-item gray"><span>5</span>19881</div></div></div>
      <div class="center"><div class="drop-strip">🍒 🍓 🍇</div><div id="gameContainer"><div id="currentFruit">🍒</div><div class="overlay" id="homeOverlay"><div style="font-size:120px;margin-bottom:20px">🍉</div><button class="play-btn" id="playBtn">PLAY</button><div class="best-score"><div style="font-size:14px;opacity:.7">BEST SCORE</div><div style="font-size:38px">👑 <span id="homeBest">0</span></div></div></div><div class="game-over" id="gameOver"><div class="game-over-card"><div style="font-size:72px">💥</div><h2>Game Over</h2><div style="font-size:28px;font-weight:900">Score : <span id="finalScore">0</span></div><button class="restart-btn" id="restartBtn">Rejouer</button></div></div></div></div>
      <div class="panel"><div class="next-panel"><h3>Next</h3><div class="next-preview" id="nextPreview">🍓</div></div><div class="evolution-panel"><h3>Fruit Evolution</h3><div class="evolution-grid"><div>🍒</div><div>🍓</div><div>🍇</div><div>🍊</div><div>🍎</div><div>🍑</div><div>🍍</div><div>🍈</div><div>🍉</div></div><div style="text-align:center;margin-top:12px;font-size:13px;font-weight:800;opacity:.7">Only 🍒 🍓 🍇 can drop.</div></div></div>
    </div>
  </div>
  <script>
    const FRUITS=["🍒","🍓","🍇","🍊","🍎","🍑","🍍","🍈","🍉"];const RADII=[28,34,40,49,58,68,79,92,108];const HIT_SCALE=[.66,.68,.69,.74,.76,.75,.72,.78,.8];const WIDTH=430,HEIGHT=640,WALL=22,FLOOR=HEIGHT-30;const gameContainer=document.getElementById('gameContainer'),currentFruitEl=document.getElementById('currentFruit'),nextPreview=document.getElementById('nextPreview'),scoreEl=document.getElementById('score'),bestScoreEl=document.getElementById('bestScore'),homeBest=document.getElementById('homeBest');let fruits=[],score=0,bestScore=Number(localStorage.getItem('emoji-suika-best')||0),currentFruit=randomFruit(),nextFruit=randomFruit(),aimX=WIDTH/2,canDrop=true,gameStarted=false,gameOver=false;updateUI();function randomFruit(){return Math.floor(Math.random()*3)}function hitRadius(level){return RADII[level]*HIT_SCALE[level]}function updateUI(){currentFruitEl.textContent=FRUITS[currentFruit];nextPreview.textContent=FRUITS[nextFruit];scoreEl.textContent=score;bestScoreEl.textContent=bestScore;homeBest.textContent=bestScore}document.getElementById('playBtn').onclick=()=>{document.getElementById('homeOverlay').style.display='none';gameStarted=true};document.getElementById('restartBtn').onclick=()=>location.reload();gameContainer.addEventListener('pointermove',e=>{const rect=gameContainer.getBoundingClientRect();const scale=WIDTH/rect.width;aimX=(e.clientX-rect.left)*scale;currentFruitEl.style.left=aimX+'px'});gameContainer.addEventListener('pointerdown',()=>{if(!gameStarted||!canDrop||gameOver)return;canDrop=false;const fruit={x:aimX,y:60,vx:0,vy:0,level:currentFruit,r:RADII[currentFruit],hr:hitRadius(currentFruit),el:document.createElement('div')};fruit.el.className='fruit';fruit.el.style.fontSize=fruit.r*1.35+'px';fruit.el.textContent=FRUITS[fruit.level];gameContainer.appendChild(fruit.el);fruits.push(fruit);currentFruit=nextFruit;nextFruit=randomFruit();updateUI();setTimeout(()=>canDrop=true,500)});function loop(){for(let i=0;i<fruits.length;i++){const a=fruits[i];a.vy+=.45;a.y+=a.vy;a.x+=a.vx;a.vx*=.985;if(a.x-a.hr<WALL){a.x=WALL+a.hr;a.vx*=-.3}if(a.x+a.hr>WIDTH-WALL){a.x=WIDTH-WALL-a.hr;a.vx*=-.3}if(a.y+a.hr>FLOOR){a.y=FLOOR-a.hr;a.vy*=-.2;if(Math.abs(a.vy)<.5)a.vy=0}for(let j=i+1;j<fruits.length;j++){const b=fruits[j];const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy)||.001,minDist=a.hr+b.hr;if(dist<minDist){if(a.level===b.level&&a.level<FRUITS.length-1){const nx=(a.x+b.x)/2,ny=(a.y+b.y)/2,newLevel=a.level+1;a.el.remove();b.el.remove();fruits.splice(j,1);fruits.splice(i,1);const merged={x:nx,y:ny,vx:0,vy:-2,level:newLevel,r:RADII[newLevel],hr:hitRadius(newLevel),el:document.createElement('div')};merged.el.className='fruit';merged.el.style.fontSize=merged.r*1.35+'px';merged.el.textContent=FRUITS[newLevel];gameContainer.appendChild(merged.el);fruits.push(merged);score+=(newLevel+1)*10;if(score>bestScore){bestScore=score;localStorage.setItem('emoji-suika-best',bestScore)}updateUI();break}const angle=Math.atan2(dy,dx),overlap=minDist-dist;a.x-=Math.cos(angle)*overlap*.5;a.y-=Math.sin(angle)*overlap*.5;b.x+=Math.cos(angle)*overlap*.5;b.y+=Math.sin(angle)*overlap*.5}}a.el.style.left=a.x+'px';a.el.style.top=a.y+'px';if(a.y<80&&fruits.length>8){gameOver=true;document.getElementById('gameOver').style.display='flex';document.getElementById('finalScore').textContent=score}}requestAnimationFrame(loop)}loop();
  </script>
</body>
</html>
